
<!DOCTYPE html>
<html lang="en">
<head>
<style>
.a{
 display:grid;
 grid-template-columns: repeat(5, 150px);
 gap:10px;
}
.m{
 background-color:green;
 border-style:solid;
 border-color:blue;
 text-align:center;
 padding:10px;
 font-size:20px;
}
</style>
</head>
<body>
<div class="a">
    <div class="m">1</div>
    <div class="m">2</div>
    <div class="m">3</div>
    <div class="m">4</div>
    <div class="m">5</div>
    <div class="m">6</div>
    <div class="m">7</div>
    <div class="m">8</div>
    <div class="m">9</div>
    <div class="m">10</div>
</div>
</body>
</html>
